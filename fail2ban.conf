# ============================================================
# /etc/fail2ban/jail.local
# ============================================================
[DEFAULT]
# Ban for 1 hour
bantime = 3600
# Check last 10 minutes
findtime = 600
# Allow 3 attempts
maxretry = 3
# Never ban localhost or LAN devices
ignoreip = 127.0.0.1/8 10.0.0.0/24

[sshd]
enabled = true
port = 22
filter = sshd
logpath = /var/log/auth.log
maxretry = 3
bantime = 3600
action = nftables[name=SSH]
         telegram

# ============================================================
# /etc/fail2ban/jail.d/suricata.conf
# ============================================================
[suricata-high]
enabled = true
filter = suricata
logpath = /var/log/suricata/fast.log
maxretry = 3
findtime = 60
bantime = 3600
ignoreip = 127.0.0.1/8 10.0.0.0/24
action = nftables-allports[name=suricata]
         telegram

# ============================================================
# /etc/fail2ban/filter.d/suricata.conf
# Matches Suricata fast.log format:
# 04/12/2026-12:48:49  [**] ET DNS ... {UDP} 10.0.0.150:58811 -> 10.0.0.49:53
# Extracts SOURCE IP (before ->) only
# ============================================================
[Definition]
failregex = \{\w+\} <HOST>:\d+ ->
datepattern = %%m/%%d/%%Y-%%H:%%M:%%S\.\d+

# Test with:
# fail2ban-regex /var/log/suricata/fast.log /etc/fail2ban/filter.d/suricata.conf

# ============================================================
# /etc/fail2ban/action.d/telegram.conf
# Sends alerts via Shuffle SOAR webhook for ban/unban
# Direct Telegram for start/stop events
# ============================================================
[Definition]
actionstart = curl -s -X POST "https://api.telegram.org/bot<TOKEN>/sendMessage" \
              -d chat_id=<CHAT_ID> \
              -d text=" Fail2ban started on Raspberry Pi"

actionstop = curl -s -X POST "https://api.telegram.org/bot<TOKEN>/sendMessage" \
             -d chat_id=<CHAT_ID> \
             -d text=" Fail2ban stopped on Raspberry Pi"

actionban = /usr/local/bin/fail2ban-telegram.sh <ip> <name> banned

actionunban = /usr/local/bin/fail2ban-telegram.sh <ip> <name> unbanned
