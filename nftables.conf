#!/usr/sbin/nft -f
# nftables configuration for Raspberry Pi 4 Security Gateway
# Part of HomeLab Security Stack - Step 2/3
# 
# Design:
# - All TCP/UDP queued to Suricata (NFQueue 0) for IPS inspection
# - ICMP bypasses queue (performance)
# - fail-open: if Suricata is down, traffic passes (bypass flag)
# - Output chain fully open (Pi is not a router)

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        # Loopback - Unbound (127.0.0.1:5335), Pi-hole FTL, Alloy
        iif lo accept

        # Drop invalid state packets
        ct state invalid drop

        # Accept established/related connections (performance - skip re-inspection)
        ct state established,related accept

        # Queue new TCP/UDP to Suricata for IPS inspection
        # bypass flag = fail-open if Suricata is down
        ip protocol tcp queue to 0
        ip protocol udp queue to 0
        ip6 nexthdr tcp queue to 0
        ip6 nexthdr udp queue to 0

        # ICMP bypasses queue (ping, traceroute)
        ip protocol icmp accept
        meta l4proto ipv6-icmp accept
    }

    chain forward {
        # Pi is DNS server only, not a router
        type filter hook forward priority 0; policy accept;
    }

    chain output {
        # Outbound traffic fully open
        type filter hook output priority 0; policy accept;
    }
}
